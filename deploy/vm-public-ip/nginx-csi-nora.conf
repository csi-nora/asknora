# Sample nginx site for CSI Nora on a VM with a public IP (or DNS name).
# Copy to e.g. /etc/nginx/sites-available/csi-nora and symlink to sites-enabled.
# Adjust paths, server_name, TLS, and upstream port (gateway default 3456).

# Upstream: Node LLM gateway (npm run gateway) — same machine
upstream csi_nora_gateway {
    server 127.0.0.1:3456;
    keepalive 8;
}

server {
    listen 80;
    # Replace with your public IP, or hostname (e.g. csi.example.com)
    server_name YOUR_PUBLIC_IP_OR_HOSTNAME;

    # Built Angular app: npm run build:vm → dist/csi-nora/browser
    root /var/www/csi-nora/browser;
    index index.html;

    # SPA — Angular routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: cache static assets (hashed filenames from ng build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy API + LLM gateway (must match Angular backendBaseUrl origin)
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://csi_nora_gateway;
    }
}

