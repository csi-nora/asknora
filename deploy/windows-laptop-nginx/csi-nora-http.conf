# Paste this block inside the http { } section of nginx.conf (Windows or Linux).
# Adjust "root" and "server_name" to match your machine.

upstream csi_nora_gateway {
    server 127.0.0.1:3456;
    keepalive 8;
}

server {
    listen 8090;
    # Your public IP or hostname (laptop / home server)
    # Accept any hostname/IP hitting this port (set a specific IP if you prefer)
    server_name _;

    # Windows: use forward slashes. Folder must contain index.html from ng build.
    root C:/csi-nora-deploy/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://csi_nora_gateway;
    }
}
