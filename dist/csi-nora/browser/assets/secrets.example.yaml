# CSI Nora — optional local secrets (copy into API Config → Local YAML, or merge by hand).
# Parsed keys are flat `name: value` lines (indentation is OK). Lines starting with # are ignored.
# Stored in the browser under localStorage key `asknora-secrets-yaml-v1` when you Save — not this file on disk.

# --- Gateway / runtime (merged into effective environment) ---
# Dev: leave empty or omit — the app uses your address-bar origin so /api/llm/* uses the dev proxy
# (npm run start:with-gateway → gateway). Set a full URL only if you need a fixed origin, and match the browser port.
backendBaseUrl: ""
preferTokenBackend: true

# --- Provider keys (optional; only non-empty values are applied) ---
# With gateway: put OPENAI_API_KEY / etc. in server/.env (browser does not send keys).
ANTHROPIC_API_KEY: ""
OPENAI_API_KEY: ""
HUGGINGFACE_API_KEY: ""

# HUGGINGFACE_API_TOKEN: ""

# --- Other env names (informational; not read by CSI Nora Angular vault today) ---
