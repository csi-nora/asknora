worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    client_max_body_size 64m;
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_connect_timeout 30s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── Ollama (OpenAI-compatible LLM API) ──────────────────────────────
        location /ollama/ {
            set $ollama_upstream http://ollama:11434;
            rewrite ^/ollama/(.*)$ /$1 break;
            proxy_pass $ollama_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ── Sandbox bridge (FastAPI BFF) ────────────────────────────────────
        location /sandbox/ {
            set $bridge_upstream http://host.docker.internal:8090;
            rewrite ^/sandbox/(.*)$ /$1 break;
            proxy_pass $bridge_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ── Streamlit (run with --server.baseUrlPath=streamlit) ─────────────
        location /streamlit/ {
            set $streamlit_upstream http://host.docker.internal:8501;
            proxy_pass $streamlit_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host       $host;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── CSI Nora dev server (ng serve on the host, port 4200) ───────────
        # Proxies to the live Angular dev server with HMR/live-reload support.
        location / {
            set $nora_dev http://host.docker.internal:4200;
            proxy_pass $nora_dev;
            proxy_http_version 1.1;
            proxy_set_header Host       $host;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
