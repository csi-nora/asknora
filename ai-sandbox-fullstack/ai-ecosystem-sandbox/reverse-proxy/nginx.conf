worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    # Allow large payloads (documents, base64 images) through to the APIs
    client_max_body_size 64m;

    # LLM responses can stream for a long time
    proxy_read_timeout   600s;
    proxy_send_timeout   600s;
    proxy_connect_timeout 30s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # WebSocket upgrade mapping (Streamlit / live reload)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Resolve backend names lazily so nginx starts even if a service is down.
    # 127.0.0.11 is the Docker embedded DNS resolver.
    # NOTE: upstreams are set via variables so an unresolvable/down service does
    # not stop nginx from booting (it returns 502 on that route instead).
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── CSI Nora single-page app (static build) ─────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        # ── Ollama (OpenAI-compatible LLM API) ──────────────────────────────
        # /ollama/v1/chat/completions -> http://ollama:11434/v1/chat/completions
        location /ollama/ {
            set $ollama_upstream http://ollama:11434;
            rewrite ^/ollama/(.*)$ /$1 break;
            proxy_pass $ollama_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;   # stream tokens as they arrive
        }

        # ── Sandbox bridge (FastAPI BFF: guardrails + device scaling) ───────
        # /sandbox/v1/chat -> http://nora-bridge:8090/v1/chat
        location /sandbox/ {
            set $bridge_upstream http://nora-bridge:8090;
            rewrite ^/sandbox/(.*)$ /$1 break;
            proxy_pass $bridge_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ── Streamlit dashboard (started with --server.baseUrlPath=streamlit) ─
        # Prefix is kept so Streamlit's own asset/websocket URLs stay correct.
        location /streamlit/ {
            set $streamlit_upstream http://streamlit:8501;
            proxy_pass $streamlit_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
        }

        # ── Vector databases (optional direct access / debugging) ───────────
        location /qdrant/ {
            set $qdrant_upstream http://qdrant:6333;
            rewrite ^/qdrant/(.*)$ /$1 break;
            proxy_pass $qdrant_upstream;
            proxy_set_header Host $host;
        }
        location /chroma/ {
            set $chroma_upstream http://chroma:8000;
            rewrite ^/chroma/(.*)$ /$1 break;
            proxy_pass $chroma_upstream;
            proxy_set_header Host $host;
        }

        # ── Proxy health probe ──────────────────────────────────────────────
        location = /healthz {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","proxy":"nginx"}';
        }

        # ── SPA fallback (Angular client-side routing) ──────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
