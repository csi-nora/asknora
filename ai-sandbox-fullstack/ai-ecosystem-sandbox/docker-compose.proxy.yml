# Full front-facing app overlay — single entry point + containerized services.
#
# Brings up nginx (reverse proxy), the Nora bridge (FastAPI) and the Streamlit
# dashboard, all on the sandbox network, so the whole app starts with ONE
# command on top of the base infra:
#
#   1) Build the UI:  cd ../csi-nora-v2 && npm run build
#   2) Start:         docker compose -f docker-compose.yml -f docker-compose.proxy.yml up -d --build
#   3) Open:          http://localhost/            (Nora UI)
#                     http://localhost/ollama/     (LLM API)
#                     http://localhost/sandbox/    (bridge)
#                     http://localhost/streamlit/  (dashboard)
#
# By default the proxy binds 0.0.0.0:9090 (LAN-reachable). Override with
# PROXY_BIND_HOST / PROXY_HTTP_PORT in .env if needed.

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: sandbox-proxy
    restart: unless-stopped
    ports:
      # DEFAULT: expose on all interfaces (LAN). Only the proxy is published this way;
      # backends stay on 127.0.0.1. See reverse-proxy/README.md.
      - "${PROXY_BIND_HOST:-0.0.0.0}:${PROXY_HTTP_PORT:-9090}:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      # Built Angular SPA (run `npm run build` in ../csi-nora-v2 first)
      - ../csi-nora-v2/dist/csi-nora/browser:/usr/share/nginx/html:ro
    depends_on:
      ollama:
        condition: service_started
      nora-bridge:
        condition: service_started
      streamlit:
        condition: service_started
      mcp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── CSI Nora bridge (FastAPI BFF: guardrails + device scaling) ─────────────
  nora-bridge:
    build:
      context: .
      dockerfile: apps/nora_bridge/Dockerfile
    container_name: sandbox-nora-bridge
    restart: unless-stopped
    # No host port published on purpose. The bridge is an internal BFF reached only
    # through the reverse proxy at /sandbox (nginx -> http://nora-bridge:8090 on the
    # Docker network). Publishing a host port here served no purpose and caused
    # "Bind for 0.0.0.0:8090 failed: port is already allocated" when 8090 was taken
    # by a leftover container. `expose` keeps it reachable inside the network only.
    expose:
      - "8090"
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL_OLLAMA: ${DEFAULT_OLLAMA_MODEL:-llama3.2:1b}
      ACCEL_DEVICE: ${ACCEL_DEVICE:-auto}
      GUARDRAILS_ENABLED: ${GUARDRAILS_ENABLED:-true}
      # Cloud key pools (optional). Prefer OPENAI_API_KEYS=k1,k2 — never commit real keys.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_KEY_SECONDARY: ${OPENAI_API_KEY_SECONDARY:-}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_API_KEY_SECONDARY: ${ANTHROPIC_API_KEY_SECONDARY:-}
      ANTHROPIC_API_KEYS: ${ANTHROPIC_API_KEYS:-}
      HF_API_KEY: ${HF_API_KEY:-}
      HF_API_KEY_SECONDARY: ${HF_API_KEY_SECONDARY:-}
      HF_API_KEYS: ${HF_API_KEYS:-}
      # Server-side, disk-backed Knowledge Base stores (persist on named volumes).
      QDRANT_URL: http://qdrant:6333
      KB_QDRANT_COLLECTION: ${KB_QDRANT_COLLECTION:-csinora_kb}
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sandbox}:${POSTGRES_PASSWORD:-sandbox_dev_password}@postgres:5432/${POSTGRES_DB:-ai_sandbox}
    depends_on:
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Streamlit dashboard (served under /streamlit/ via the proxy) ───────────
  # Overrides the profiled base service so it starts as part of the app stack.
  streamlit:
    profiles: !reset []
    restart: unless-stopped
    command:
      - streamlit
      - run
      - dashboard/app_lite.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.baseUrlPath=streamlit
      - --server.enableCORS=false
      - --server.enableXsrfProtection=false
      - --browser.gatherUsageStats=false
    # Override the base healthcheck: with --server.baseUrlPath=streamlit the health
    # endpoint moves under /streamlit/, so the default /_stcore/health probe 404s
    # and marks the container unhealthy even though it is serving fine.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8501/streamlit/_stcore/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MCP server (FastMCP) — exposes calculator/web_search/wikipedia as MCP tools ─
  # HTTP/SSE transport for networked clients, reachable ONLY through the proxy at
  # /mcp/ (SSE stream at /mcp/sse). No host port is published — internal to the
  # sandbox network, consistent with the security model. For Cursor/local use the
  # stdio transport via .cursor/mcp.json (no container needed).
  mcp:
    build:
      context: .
      dockerfile: apps/mcp_server/Dockerfile
    container_name: sandbox-mcp
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_BASE_PATH: /mcp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('127.0.0.1',8000),3).close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
